<!DOCTYPE html>
<html>
<head><title>PokeSearch</title></head>

<body>
  <h1>1st Change REFACTOR<h1>
  <h1>PokeSearch</h1>
  <p>MESSAGE FOR PULL REQUEST v1.1</p>
  <input id="input" placeholder="Pokemon name (e.g. pikachu)" />
  <button onclick="search()">Search</button>
  <h1>SECOND change REFACTOR<h1>
  <div id="result"></div>

  <h2>Search History</h2>
  <ul id="history"></ul>

  <script>
    const BACKEND = 'http://${window.location.hostname}:3000'

    async function search() {
      const name = document.getElementById('input').value.toLowerCase()

      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`)
      if (!res.ok) {
        document.getElementById('result').innerHTML = '<p>Pokemon not found</p>'
        return
      }

      const data = await res.json()
      document.getElementById('result').innerHTML = `
        <h2>${data.name}</h2>
        <img src="${data.sprites.front_default}" />
        <p>Height: ${data.height} | Weight: ${data.weight}</p>
        <p>Types: ${data.types.map(t => t.type.name).join(', ')}</p>
      `

      await fetch(`${BACKEND}/searches`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: data.name })
      })

      loadHistory()
    }

    async function loadHistory() {
      const res = await fetch(`${BACKEND}/searches`)
      const searches = await res.json()
      document.getElementById('history').innerHTML = searches
        .map(s => `<li>${s.name}</li>`)
        .join('')
    }

    loadHistory()
  </script>
</body>
</html>
