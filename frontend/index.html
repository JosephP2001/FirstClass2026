<!DOCTYPE html>
<html>
<head><title>Posts App</title></head>
<body>
  <h1>Posts from JSONPlaceholder</h1>
  <ul id="list"></ul>

  <script>
    fetch('https://jsonplaceholder.typicode.com/posts')
      .then(r => r.json())
      .then(posts =>
        posts.slice(0, 10).forEach(p => {
          document.getElementById('list').innerHTML += `<li><b>${p.title}</b></li>`
        })
      )
  </script>
</body>
</html>
